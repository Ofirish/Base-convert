<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Converter & Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Import fonts: Inter for UI text, JetBrains Mono for code/math */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        /* CSS Variables for consistent theming */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
        }

        /* Base Body Styles */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            font-size: 14px;
        }

        /* Main Container Container */
        .container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 950px;
            width: 100%;
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        /* Header Styles */
        header { padding: 16px 20px; border-bottom: 1px solid var(--border-color); background: #fdfdfd; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.25rem; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 8px; }
        
        /* Language Toggles */
        .language-options { display: flex; gap: 4px; background: var(--bg-color); padding: 4px; border-radius: 6px; border: 1px solid var(--border-color); }
        .language-options button {
            background: transparent; border: none; color: var(--text-muted); padding: 4px 10px;
            border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: 0.2s;
        }
        .language-options button.active { background: #fff; color: var(--primary); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        /* Navigation Tabs */
        .tab-nav { display: flex; background: var(--bg-color); border-bottom: 1px solid var(--border-color); padding: 0 20px; overflow-x: auto;}
        .tab-btn {
            padding: 10px 16px; font-weight: 600; color: var(--text-muted); cursor: pointer;
            border-bottom: 2px solid transparent; transition: 0.2s; font-size: 0.9rem; white-space: nowrap;
        }
        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--card-bg); }

        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }

        /* Inputs & Form Controls */
        label { display: block; font-weight: 600; margin-bottom: 4px; color: var(--text-main); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        
        input[type="text"], input[type="number"], textarea, select {
            width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px;
            font-size: 0.9rem; background: var(--input-bg); transition: 0.2s; font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }
        
        /* Buttons */
        .btn-primary {
            width: 100%; padding: 10px; background-color: var(--primary); color: #fff;
            border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-icon {
            background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-muted);
            padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .btn-icon:hover { background: #fee2e2; color: #ef4444; border-color: #fca5a5; }

        /* Results & Outputs */
        .results-box {
            background: #0f172a; color: #f8fafc; border-radius: 8px; padding: 12px; min-height: 80px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; white-space: pre-wrap; word-wrap: break-word; line-height: 1.5; overflow-x: auto;
        }
        .error-text { color: #ef4444; font-weight: bold; }

        /* Explanation UI Components */
        .explanation-box { margin-top: 16px; border: 1px solid var(--border-color); border-radius: 8px; background: #fff; overflow: hidden; }
        .explanation-header { background: var(--bg-color); padding: 8px 12px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .explanation-header h3 { margin: 0; font-size: 0.9rem; font-weight: 600; }
        .explanation-options { display: flex; gap: 6px; padding: 12px; background: #fdfdfd; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; justify-content: center;}
        .exp-btn {
            background: #fff; color: var(--text-main); border: 1px solid var(--border-color);
            padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: 500; transition: 0.2s;
        }
        .exp-btn:hover, .exp-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .explanation-content { padding: 16px; font-size: 0.85rem; color: var(--text-main); font-family: 'JetBrains Mono', monospace; background: #fff; max-height: 400px; overflow-y: auto;}
        
        /* Direct Mapping Tables */
        .direct-map-table { width: 100%; text-align: left; border-collapse: collapse; margin-top: 8px; font-size: 0.85rem; margin-bottom: 16px;}
        .direct-map-table th, .direct-map-table td { padding: 6px 12px; border-bottom: 1px solid var(--border-color); }
        .direct-map-table th { background: var(--bg-color); font-weight: 600; }
        .direct-map-table td:first-child { font-weight: 600; color: var(--primary); }

        /* Reference/Conversion Tables */
        .ref-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.9rem; }
        .ref-table th, .ref-table td { border: 1px solid var(--border-color); padding: 8px; }
        .ref-table th { background-color: var(--bg-color); font-weight: 600; color: var(--text-main); }
        .ref-table tr:nth-child(even) { background-color: #f8fafc; }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .carry-bit { color: #facc15; font-weight: bold; }
        
        /* Collapsible Sections */
        .collapsible-toggle {
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            font-size: 1em; font-weight: 600; color: var(--text-main); margin-bottom: 8px; padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color); transition: all 0.3s;
        }
        .collapsible-toggle:hover { color: var(--primary); border-color: var(--primary); }
        .collapsible-toggle.open i { transform: rotate(180deg); }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-in-out; font-size: 0.85rem;}
        .collapsible-content.open { max-height: 2500px; padding-bottom: 16px;}

        /* Theory / Help Elements */
        .theory-item { margin-bottom: 12px; border-left: 3px solid var(--primary); padding-left: 10px; }
        .theory-example { background: #f1f5f9; padding: 10px; border-radius: 6px; margin-top: 8px; font-family: 'JetBrains Mono', monospace; white-space: pre; overflow-x: auto; font-size: 0.8rem;}
        
        /* Toast Notifications */
        .message-box {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background-color: #1e293b; color: #fff; padding: 10px 20px; border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); z-index: 1000; font-size: 0.85rem; font-weight: 500;
            opacity: 0; visibility: hidden; transition: 0.3s ease;
        }
        .message-box.show { opacity: 1; visibility: visible; transform: translate(-50%, -5px); }

        /* RTL (Hebrew) Support Overrides */
        body[dir="rtl"] { text-align: right; }
        body[dir="rtl"] .direct-map-table { text-align: right; }
        body[dir="rtl"] .theory-item { border-left: none; border-right: 3px solid var(--primary); padding-left: 0; padding-right: 10px; }
    </style>
</head>
<body dir="ltr">

<div class="message-box" id="message-box"></div>

<div class="container">
    <header>
        <h1><i class="fas fa-calculator text-blue-600"></i> <span id="app-title">Base Converter</span></h1>
        <div class="language-options">

            <button id="lang-he">HE</button>
        </div>
    </header>

    <nav class="tab-nav">
        <div class="tab-btn active" data-tab="converter-tab" id="tab-label-converter">Converter</div>
        <div class="tab-btn" data-tab="tutor-tab" id="tab-label-tutor">Exercise Tutor</div>

    <div id="converter-tab" class="tab-content active">
        <div class="grid grid-cols-12 gap-3 mb-4">

            </div>

        <div class="explanation-box" id="original-explanation" style="display: none;">

            </h2>
            <div id="usage-content" class="collapsible-content"></div>
        </div>
    </div>

    <div id="tutor-tab" class="tab-content">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="flex flex-col">
                <div class="flex-between mb-1">

                <label id="label-target-base">Desired Solution Form:</label>
                <div class="flex flex-wrap gap-2 mb-4">

                    <button class="exp-btn target-base-btn" data-base="10" data-mode="normal" id="tutor-opt-dec">Decimal</button>
                    <button class="exp-btn target-base-btn" data-base="16" data-mode="normal" id="tutor-opt-hex">Hex</button>
                    <button class="exp-btn target-base-btn active" data-base="16" data-mode="short" id="tutor-opt-hex-short">Hex (Short)</button>

                    </h2>
                    <div id="theory-content" class="collapsible-content"></div>
                </div>
            </div>

            <div class="flex flex-col">

                    <div id="tutor-visual-output" class="results-box" style="min-height:auto; font-size: 0.85rem; background: #1e293b; color: #38bdf8;"></div>
                    <div id="tutor-visual-note" class="mt-2 text-xs text-slate-500 font-medium px-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="table-tab" class="tab-content">
        <label id="label-ref-title" class="mb-2 text-lg text-center block w-full text-slate-700">Numbers 0 to 15 in Standard Bases</label>

                        <th id="th-hex">Hexadecimal (16)</th>
                    </tr>
                </thead>
                <tbody id="ref-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    // --- State Variables ---
    let currentLang = 'en';
    let tutorTargetBase = 16;
    let tutorTargetMode = 'short';
    let currentPlainTextExplanation = '';
    let currentCsvTableData = null;
    let lastTutorFullContent = "";

    // --- Core UI Functions ---
    const messageBox = document.getElementById('message-box');
    function showMessageBox(message, duration = 2000) {
        messageBox.textContent = message;
        messageBox.classList.add('show');
        setTimeout(() => messageBox.classList.remove('show'), duration);
    }

    function getPrecision() {
        const val = parseInt(document.getElementById('decimal-places').value);
        return isNaN(val) ? 8 : val;
    }

    function cleanFloat(num, prec) {
        const p = typeof prec === 'undefined' ? getPrecision() : prec;
        return parseFloat(num.toFixed(p));
    }

    function removeEmojis(str) {
        return str.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '');
    }

    // --- Validation & Math Operations ---
    function validateInputDetailed(number, base) {
        const lang = langData[currentLang];
        if (!number || number.trim() === "") return { valid: false, error: lang.errEmpty };
        if ((number.match(/\./g) || []).length > 1) return { valid: false, error: lang.errDecimal };
        if ((number.match(/\//g) || []).length > 1) return { valid: false, error: lang.errFraction };
        if (number.includes('.') && number.includes('/')) return { valid: false, error: lang.errMixed };
        
        let validChars = digitsMap.substring(0, base);
        let pattern = new RegExp(`^[${validChars}\\.\\/]+$`, 'i');
        if (!pattern.test(number)) {
            let invalidChar = number.split('').find(c => !validChars.includes(c.toUpperCase()) && c !== '.' && c !== '/');
            return { valid: false, error: lang.errInvalidChar(invalidChar, base, validChars) };
        }
        return { valid: true, error: "" };
    }

    function toDecimal(number, base) {
        if (typeof number !== 'string') number = String(number);
        // Handle explicit fractions
        if (number.includes('/')) {
            const parts = number.split('/');
            const num = toDecimal(parts[0], base);
            const den = toDecimal(parts[1], base);
            return (num !== null && den !== null && den !== 0) ? cleanFloat(num / den) : null;
        }
        const parts = number.toUpperCase().split('.');
        let decimalValue = 0;
        const intDigits = parts[0].split('').reverse();
        // Convert integer part
        for (let i = 0; i < intDigits.length; i++) {
            decimalValue += digitsMap.indexOf(intDigits[i]) * Math.pow(base, i);
        }
        // Convert fractional part
        if (parts.length === 2) {
            const fracDigits = parts[1].split('');
            for (let i = 0; i < fracDigits.length; i++) {
                decimalValue += digitsMap.indexOf(fracDigits[i]) * Math.pow(base, -(i + 1));
            }
        }
        return cleanFloat(decimalValue);
    }

    function fromDecimal(number, base) {
        if (number === 0) return "0";
        let isNegative = number < 0;
        number = Math.abs(number);
        let intPart = Math.floor(number);
        let fracPart = number - intPart;
        let result = "";
        
        if (intPart === 0) result = "0";
        else {
            let tempInt = intPart;
            while (tempInt > 0) {
                result = digitsMap[tempInt % base] + result;
                tempInt = Math.floor(tempInt / base);
            }
        }
        
        if (fracPart > 0) {
            let fracResult = "";
            let count = 0;
            let tempFrac = fracPart;
            const prec = getPrecision();
            while (tempFrac > 0 && count < prec) {
                tempFrac = cleanFloat(tempFrac * base, prec + 2);
                let digit = Math.floor(tempFrac);
                fracResult += digitsMap[digit];
                tempFrac = cleanFloat(tempFrac - digit, prec + 2);
                count++;
            }
            if (fracResult.length > 0) result += "." + fracResult;
        }
        return (isNegative ? "-" : "") + result;
    }

    function getFullRepresentation(decimalVal) {
        const b = fromDecimal(decimalVal, 2); const o = fromDecimal(decimalVal, 8);
        const d = decimalVal; const h = fromDecimal(decimalVal, 16);
        return `[Bin: ${b}, Oct: ${o}, Dec: ${d}, Hex: ${h}]`;
    }

    // --- Tab 1: Converter Explanation Generation ---
    function generateDirectExplanation(inputNum, srcBase, targetBase) {
        const lang = langData[currentLang];
        let html = ''; let plain = '';
        
        // Direct conversion spanning Octal <-> Hexadecimal via Binary
        if ((srcBase === 8 && targetBase === 16) || (srcBase === 16 && targetBase === 8)) {
            let step1 = generateDirectExplanation(inputNum, srcBase, 2);
            let binStr = fromDecimal(toDecimal(inputNum, srcBase), 2);
            let step2 = generateDirectExplanation(binStr, 2, targetBase);
            
            html += `<strong class="text-blue-600 text-base block mb-2">${srcBase === 8 ? lang.expDirectOctHex : lang.expDirectHexOct}</strong>`;
            html += `<div class="mb-2 text-slate-700 font-semibold"><u>Step 1: Base ${srcBase} to Binary</u></div>` + step1.html;
            html += `<div class="mt-4 mb-2 text-slate-700 font-semibold"><u>Step 2: Binary to Base ${targetBase}</u></div>` + step2.html;
            
            plain += `${srcBase === 8 ? lang.expDirectOctHex : lang.expDirectHexOct}\n\nStep 1: Base ${srcBase} to Binary\n${step1.plain}\n\nStep 2: Binary to Base ${targetBase}\n${step2.plain}`;
            return {html, plain};
        }

        let groupSize = targetBase === 16 || srcBase === 16 ? 4 : 3;
        const isBinToOther = srcBase === 2;

        // Grouping: Binary -> Octal/Hex
        if (isBinToOther) {
            html += `<strong class="text-blue-600 text-base block mb-2">${targetBase === 16 ? lang.expDirectBinHex : lang.expDirectBinOct}</strong>`;
            plain += (targetBase === 16 ? lang.expDirectBinHex : lang.expDirectBinOct) + "\n\n";
            
            let parts = inputNum.split('.');
            let intPart = parts[0]; let fracPart = parts[1] || "";
            
            // Pad to ensure groups fit perfectly
            while (intPart.length % groupSize !== 0) intPart = '0' + intPart;
            if (fracPart) { while (fracPart.length % groupSize !== 0) fracPart += '0'; }
            
            html += `<table class="direct-map-table"><thead><tr><th>${lang.directGroup}</th><th>${lang.directDigit}</th></tr></thead><tbody>`;
            plain += `${lang.directGroup} -> ${lang.directDigit}\n`;
            
            let finalInt = ""; let finalFrac = "";
            for (let i = 0; i < intPart.length; i += groupSize) {
                let chunk = intPart.substring(i, i + groupSize);
                let dec = parseInt(chunk, 2); let digit = digitsMap[dec];
                finalInt += digit;
                html += `<tr><td>${chunk}</td><td>${digit}</td></tr>`;
                plain += `${chunk} -> ${digit}\n`;
            }
            if (fracPart) {
                html += `<tr><td colspan="2" style="text-align:center; color:#94a3b8;">.</td></tr>`;
                plain += `.\n`;
                for (let i = 0; i < fracPart.length; i += groupSize) {
                    let chunk = fracPart.substring(i, i + groupSize);
                    let dec = parseInt(chunk, 2); let digit = digitsMap[dec];
                    finalFrac += digit;
                    html += `<tr><td>${chunk}</td><td>${digit}</td></tr>`;
                    plain += `${chunk} -> ${digit}\n`;
                }
            }
            html += `</tbody></table>`;
            let res = finalInt.replace(/^0+(?!$)/, '') + (finalFrac ? "." + finalFrac : "");
            if(res === "" || res.startsWith(".")) res = "0" + res;
            html += `<strong class="text-slate-800 bg-slate-100 px-2 py-1 rounded">Result: ${res}</strong>`;
            plain += `\nResult: ${res}`;
        } 
        // Expanding: Octal/Hex -> Binary
        else {
            html += `<strong class="text-blue-600 text-base block mb-2">${srcBase === 16 ? lang.expDirectHexBin : lang.expDirectOctBin}</strong>`;
            plain += (srcBase === 16 ? lang.expDirectHexBin : lang.expDirectOctBin) + "\n\n";
            
            let parts = inputNum.toUpperCase().split('.');
            html += `<table class="direct-map-table"><thead><tr><th>${lang.directDigit}</th><th>${lang.directBits}</th></tr></thead><tbody>`;
            plain += `${lang.directDigit} -> ${lang.directBits}\n`;
            
            let finalInt = ""; let finalFrac = "";
            for (let char of parts[0]) {
                let dec = digitsMap.indexOf(char);
                let bin = dec.toString(2).padStart(groupSize, '0');
                finalInt += bin + " ";
                html += `<tr><td>${char}</td><td>${bin}</td></tr>`;
                plain += `${char} -> ${bin}\n`;
            }
            if (parts[1]) {
                html += `<tr><td colspan="2" style="text-align:center; color:#94a3b8;">.</td></tr>`;
                plain += `.\n`;
                for (let char of parts[1]) {
                    let dec = digitsMap.indexOf(char);
                    let bin = dec.toString(2).padStart(groupSize, '0');
                    finalFrac += bin + " ";
                    html += `<tr><td>${char}</td><td>${bin}</td></tr>`;
                    plain += `${char} -> ${bin}\n`;
                }
            }
            html += `</tbody></table>`;
            let res = finalInt.replace(/^0+(?!$)/, '').trim().replace(/ /g, '') + (finalFrac ? "." + finalFrac.trim().replace(/ /g, '') : "");
            if(res === "" || res.startsWith(".")) res = "0" + res;
            html += `<strong class="text-slate-800 bg-slate-100 px-2 py-1 rounded">Result: ${res}</strong>`;
            plain += `\nResult: ${res}`;
        }
        return { html, plain };
    }

    function generateDetailedStandardExplanation(inputNum, srcBase, targetBase, decimalValue) {
        const lang = langData[currentLang];
        const prec = getPrecision();
        let html = `<strong class="text-blue-600 text-base block mb-2">${lang.stdConvHeading}</strong>`;
        let plain = lang.stdConvHeading + "\n\n";

        // To Decimal (Multiplication Breakdown)
        if (srcBase !== 10) {
            html += `<div class="mb-4 text-slate-800 font-semibold"><u>1. Base ${srcBase} to Decimal:</u><br>`;
            plain += `1. Base ${srcBase} to Decimal:\n`;
            
            if (inputNum.includes('/')) {
                const parts = inputNum.split('/');
                let line = `Fraction: ${parts[0]} / ${parts[1]} = ${decimalValue}`;
                html += `<div class="ml-2 mt-1 text-slate-600 font-normal">${line}</div>`; plain += `  ${line}\n`;
            } else {
                const parts = inputNum.toUpperCase().split('.');
                const intDigits = parts[0].split('').reverse();
                for (let i = 0; i < intDigits.length; i++) {
                    let val = digitsMap.indexOf(intDigits[i]);
                    let term = cleanFloat(val * Math.pow(srcBase, i), prec);
                    let line = lang.expToDecBody(intDigits[i], i, val, srcBase, term);
                    html += `<div class="ml-2 mt-1 text-slate-600 font-normal">${line}</div>`; plain += `  ${line}\n`;
                }
                if (parts[1]) {
                    const fracDigits = parts[1].split('');
                    for (let i = 0; i < fracDigits.length; i++) {
                        let val = digitsMap.indexOf(fracDigits[i]);
                        let term = cleanFloat(val * Math.pow(srcBase, -(i + 1)), prec);
                        let line = `Digit '${fracDigits[i]}' at pos -${i+1}: ${val} * (${srcBase}^-${i+1}) = ${term}`;
                        html += `<div class="ml-2 mt-1 text-slate-600 font-normal">${line}</div>`; plain += `  ${line}\n`;
                    }
                }
                html += `<div class="mt-2 font-bold">${lang.expFinalSum(decimalValue)}</div></div>`;
                plain += `  ${lang.expFinalSum(decimalValue)}\n\n`;
            }
        }

        let finalResult = fromDecimal(decimalValue, targetBase);

        // From Decimal to Target (Division Remainder Breakdown)
        if (targetBase !== 10) {
            let stepNum = srcBase !== 10 ? "2" : "1";
            html += `<div class="mb-4 text-slate-800 font-semibold"><u>${stepNum}. Decimal to Base ${targetBase}:</u><br>`;
            plain += `${stepNum}. Decimal to Base ${targetBase}:\n`;

            let intPart = Math.floor(decimalValue);
            let fracPart = cleanFloat(decimalValue - intPart, prec);
            let tempInt = intPart; let intSteps = [];
            
            while (tempInt > 0) {
                let rem = tempInt % targetBase; let next = Math.floor(tempInt / targetBase);
                intSteps.push({current: tempInt, next, rem, digit: digitsMap[rem]});
                tempInt = next;
            }
            if (intPart === 0) intSteps.push({current: 0, next: 0, rem: 0, digit: '0'});
            
            intSteps.forEach(s => {
                let line = lang.expFromDecBody(s.current, targetBase, s.next, s.rem, s.digit);
                html += `<div class="ml-2 mt-1 text-slate-600 font-normal">${line}</div>`; plain += `  ${line}\n`;
            });
            
            if (fracPart > 0) {
                html += `<div class="mt-2 text-slate-800 font-medium">${lang.expFracFromDecTitle(decimalValue, targetBase)}</div>`;
                plain += `  Fractional part:\n`;
                let tempFrac = fracPart; let count = 0;
                while (tempFrac > 0 && count < prec) {
                    let product = cleanFloat(tempFrac * targetBase, prec + 2);
                    let digit = Math.floor(product);
                    let line = lang.expFracFromDecBody(tempFrac, targetBase, product, digitsMap[digit]);
                    html += `<div class="ml-2 mt-1 text-slate-600 font-normal">${line}</div>`; plain += `  ${line}\n`;
                    tempFrac = cleanFloat(product - digit, prec + 2); count++;
                }
            }
            html += `<div class="mt-2 font-bold">${lang.expReadRemainders(finalResult)}</div></div>`;
            plain += `  Final Result: ${finalResult}\n`;

            // Verification (Check by Multiplication backwards)
            html += `<div class="mt-4 text-slate-800 font-semibold"><u>${lang.verifHeading}</u><br>`;
            plain += `\n${lang.verifHeading}\n`;
            
            const resParts = finalResult.toUpperCase().split('.');
            const resInt = resParts[0].split('').reverse();
            let checkSumStr = [];
            for(let i = 0; i < resInt.length; i++) {
                let val = digitsMap.indexOf(resInt[i]);
                checkSumStr.push(`${val}*${targetBase}^${i}`);
            }
            if(resParts[1]) {
                const resFrac = resParts[1].split('');
                for(let i=0; i < resFrac.length; i++) {
                    let val = digitsMap.indexOf(resFrac[i]);
                    checkSumStr.push(`${val}*${targetBase}^-${i+1}`);
                }
            }
            html += `<div class="ml-2 mt-1 text-slate-600 font-normal">${checkSumStr.join(' + ')} = ${decimalValue}</div></div>`;
            plain += `  ${checkSumStr.join(' + ')} = ${decimalValue}\n`;


            // Binary Reference Table injected directly into logic if Target == Binary
            if (targetBase === 2) {
                html += `<div><h4 class="font-bold text-slate-800 mt-4 mb-2">${lang.binaryTableTitle(decimalValue)}</h4>`;
                let tableHTML = '<div class="overflow-x-auto"><table class="ref-table"><thead><tr>';
                let powers = []; let values = []; let bits = [];
                let highestPower = intPart > 0 ? Math.floor(Math.log2(intPart)) : 0;
                for (let p = highestPower; p >= 0; p--) { powers.push(p); values.push(Math.pow(2, p)); }
                
                const binaryParts = finalResult.split('.');
                if (binaryParts[1]) {
                    for (let i = 0; i < binaryParts[1].length; i++) {
                        powers.push(-(i + 1)); values.push(Math.pow(2, -(i + 1)));
                    }
                }
                
                tableHTML += `<th>${lang.rowPower}</th>`;
                powers.forEach(p => tableHTML += `<th>2<sup>${p}</sup></th>`);
                tableHTML += `</tr></thead><tbody><tr><td>${lang.rowValue}</td>`;
                values.forEach(v => tableHTML += `<td>${cleanFloat(v, prec)}</td>`);
                tableHTML += `</tr><tr><td class="font-bold text-blue-600">${lang.rowBit}</td>`;
                
                let tempValTable = decimalValue;
                powers.forEach(p => {
                    let val = Math.pow(2, p);
                    let bit = tempValTable >= val - 0.0000000001 ? 1 : 0;
                    bits.push(bit);
                    if (bit) tempValTable = cleanFloat(tempValTable - val, prec + 5);
                    tableHTML += `<td class="font-bold text-blue-600">${bit}</td>`;
                });
                tableHTML += '</tr></tbody></table></div></div>';
                html += tableHTML;
            }
        }
        return { html, plain };
    }

    // --- Tab 2: Tutor Visualizations & Math Processing ---
    function calculateBinaryCarries(a, b, op) {
        let maxLen = Math.max(a.length, b.length);
        let s1 = a.padStart(maxLen, '0'); let s2 = b.padStart(maxLen, '0');
        let carries = new Array(maxLen).fill('0');
        let c = 0;
        if (op === '+') {
            for (let i = maxLen - 1; i >= 0; i--) {
                let sum = parseInt(s1[i]) + parseInt(s2[i]) + c;
                c = sum > 1 ? 1 : 0;
                if (i > 0) carries[i - 1] = String(c);
            }
        } else if (op === '-') {
            let borrow = 0;
            for (let i = maxLen - 1; i >= 0; i--) {
                let v1 = parseInt(s1[i]) - borrow; let v2 = parseInt(s2[i]);
                if (v1 < v2) borrow = 1; else borrow = 0;
                if (i > 0) carries[i - 1] = String(borrow);
            }
        }
        return carries;
    }

    function generateVisualization(op, term1Bin, term2Bin, resBin) {
        const lang = langData[currentLang];
        const t1 = term1Bin.replace('-', ''); const t2 = term2Bin.replace('-', ''); const res = resBin.replace('-', '');
        let html = ""; let textOnly = "";
        if (op === '*') {
            const b = t2.split('').reverse();
            const rows = [];
            for (let i = 0; i < b.length; i++) {
                if (b[i] === '1') rows.push(t1 + '0'.repeat(i)); else rows.push('0'.repeat(t1.length + i));
            }
            const maxLen = Math.max(res.length, ...rows.map(r => r.length));
            let colStr = lang.visCol.padEnd(10);
            for (let i = maxLen; i >= 1; i--) colStr += i + " ";
            html += colStr + "\n" + "-".repeat(colStr.length) + "\n";
            textOnly += colStr + "\n" + "-".repeat(colStr.length) + "\n";
            rows.forEach((r, idx) => {
                let rowLabel = `${lang.visRow} ${idx + 1}:`.padEnd(10);
                let rowContent = r.split('').join(' ').padStart((maxLen * 2) - 1);
                html += rowLabel + rowContent + "\n";
                textOnly += rowLabel + rowContent + "\n";
            });
            html += "-".repeat(colStr.length) + "\n";
            let resStr = `${lang.visRes.padEnd(10)}` + res.split('').join(' ').padStart((maxLen * 2) - 1);
            html += resStr; textOnly += "-".repeat(colStr.length) + "\n" + resStr;
        } else {
            const maxLen = Math.max(t1.length, t2.length, res.length);
            const carries = calculateBinaryCarries(t1, t2, op);
            let colStr = lang.visCol.padEnd(10);
            for (let i = maxLen; i >= 1; i--) colStr += i + " ";
            html += colStr + "\n" + "-".repeat(colStr.length) + "\n";
            textOnly += colStr + "\n" + "-".repeat(colStr.length) + "\n";
            
            let carryLabel = (op === '+' ? lang.visCarry : lang.visBorrow).padEnd(10);
            // Colorizing carries/borrows dynamically in visual block
            let carryContentHtml = carries.map(c => c === '1' ? `<span class="carry-bit">${c}</span>` : '0').join(' ').padStart((maxLen * 2) - 1);
            let carryContentPlain = carries.join(' ').padStart((maxLen * 2) - 1);
            html += carryLabel + carryContentHtml + "\n";
            textOnly += carryLabel + carryContentPlain + "\n";
            
            let r1 = `${lang.visRow} 1:`.padEnd(10) + t1.padStart(maxLen, '0').split('').join(' ').padStart((maxLen * 2) - 1) + "\n";
            let r2 = `${op} ${lang.visRow} 2:`.padEnd(10) + t2.padStart(maxLen, '0').split('').join(' ').padStart((maxLen * 2) - 1) + "\n";
            html += r1 + r2 + "-".repeat(colStr.length) + "\n";
            textOnly += r1 + r2 + "-".repeat(colStr.length) + "\n";
            let resStr = (op === '+' ? lang.visSum : lang.visRes).padEnd(10) + res.padStart(maxLen, '0').split('').join(' ').padStart((maxLen * 2) - 1);
            html += resStr; textOnly += resStr;
        }
        lastTutorVisualContent = textOnly;
        return html;
    }

    function binaryShortcutMethod(binString, groupSize, base) {
        const lang = langData[currentLang];
        let isNegative = binString.startsWith('-'); let cleanBin = binString.replace('-', '');
        let parts = cleanBin.split('.'); let intPart = parts[0]; let fracPart = parts[1] || "";
        const stepLabel = base === 16 ? lang.tutorStep3Hex : lang.tutorStep3Oct;
        let steps = `${stepLabel}:\n${lang.shortcutStepGroup(groupSize)}\n`;
        
        while (intPart.length % groupSize !== 0) intPart = '0' + intPart;
        let intGroups = []; let intResult = "";
        for (let i = 0; i < intPart.length; i += groupSize) {
            let chunk = intPart.substring(i, i + groupSize);
            let digit = parseInt(chunk, 2).toString(base).toUpperCase();
            intGroups.push(chunk); intResult += digit;
        }
        
        let fracResult = ""; let fracGroups = [];
        if (fracPart) {
            while (fracPart.length % groupSize !== 0) fracPart += '0';
            for (let i = 0; i < fracPart.length; i += groupSize) {
                let chunk = fracPart.substring(i, i + groupSize);
                let digit = parseInt(chunk, 2).toString(base).toUpperCase();
                fracGroups.push(chunk); fracResult += digit;
            }
        }
        let finalResultStr = (isNegative ? "-" : "") + intResult.replace(/^0+(?!$)/, '') + (fracResult ? "." + fracResult : "");
        if(finalResultStr === "" || finalResultStr.startsWith(".")) finalResultStr = "0" + finalResultStr;
        steps += `${lang.shortcutGroupsLabel} ${intGroups.join(' ')} ${fracPart ? '. ' + fracGroups.join(' ') : ''}\n${lang.shortcutResultLabel} ${finalResultStr}(${base})`;
        return { steps, finalResult: finalResultStr };
    }

    function generateBinaryTableForTutor(decimalValue, resBin) {
        const data = langData[currentLang]; const prec = getPrecision();
        let intPart = Math.floor(Math.abs(decimalValue));
        let tableHTML = `<div style="padding-top: 15px; border-top: 1px solid #eee; margin-top:15px;"><h4 class="font-bold mb-2">${data.binaryTableTitle(decimalValue)}</h4>`;
        tableHTML += '<div class="overflow-x-auto"><table class="ref-table"><thead><tr>';
        let powers = []; let values = []; let bits = [];
        let highestPower = intPart > 0 ? Math.floor(Math.log2(intPart)) : 0;
        for (let p = highestPower; p >= 0; p--) { powers.push(p); values.push(Math.pow(2, p)); }
        
        const binaryParts = resBin.replace('-', '').split('.');
        if (binaryParts[1]) {
            for (let i = 0; i < binaryParts[1].length; i++) { powers.push(-(i + 1)); values.push(Math.pow(2, -(i + 1))); }
        }
        tableHTML += `<th>${data.rowPower}</th>`;
        powers.forEach(p => tableHTML += `<th>2<sup>${p}</sup></th>`);
        tableHTML += `</tr></thead><tbody><tr><td>${data.rowValue}</td>`;
        values.forEach(v => tableHTML += `<td>${cleanFloat(v, prec)}</td>`);
        tableHTML += `</tr><tr><td class="font-bold text-blue-600">${data.rowBit}</td>`;
        
        let tempValTable = Math.abs(decimalValue);
        powers.forEach(p => {
            let val = Math.pow(2, p);
            let bit = tempValTable >= val - 0.0000000001 ? 1 : 0;
            bits.push(bit);
            if (bit) tempValTable = cleanFloat(tempValTable - val, prec + 5);
            tableHTML += `<td class="font-bold text-blue-600">${bit}</td>`;
        });
        tableHTML += '</tr></tbody></table></div></div>';
        return tableHTML;
    }

    function solveExercise() {
        const inputRaw = document.getElementById('exercise-input').value.toLowerCase();
        const textOutput = document.getElementById('tutor-text-output');
        const tableOutput = document.getElementById('tutor-table-output');
        const visOutput = document.getElementById('tutor-visual-output');
        const visNote = document.getElementById('tutor-visual-note');
        const lang = langData[currentLang];
        tableOutput.innerHTML = "";
        visNote.innerHTML = ""; // Clear existing notes
        
        let operator = '';
        if (inputRaw.includes('+')) operator = '+';
        else if (inputRaw.includes('-')) operator = '-';
        else if (inputRaw.includes('*')) operator = '*';
        else if (inputRaw.includes('/')) operator = '/';
        
        if (!operator) {
            textOutput.innerHTML = `<span class="error-text">${currentLang === 'he' ? 'פורמט לא תקין. נדרש אופרטור מפורש' : 'Invalid format. Missing operator.'}</span>`;
            return;
        }
        
        const operands = inputRaw.split(operator).map(s => s.trim());
        let fullExpl = `${lang.tutorStep1}:\n`;
        let stepsOnly = ""; let decimalTerms = []; let binaryTerms = [];
        
        for (let i = 0; i < operands.length; i++) {
            const termRegex = /([0-9a-f.]+)\s*\(\s*([a-z0-9]+)\s*\)/;
            const match = operands[i].match(termRegex);
            let val, base;
            if (match) { val = match[1]; base = baseAlias[match[2]] || parseInt(match[2]); }
            else { val = operands[i]; base = 10; }
            
            let validation = validateInputDetailed(val, base);
            if(!validation.valid) {
                 textOutput.innerHTML = `<span class="error-text">${validation.error}</span>`; return;
            }

            let dec = toDecimal(val, base);
            if (dec === null) { textOutput.innerHTML = `<span class="error-text">Invalid Number: ${val}</span>`; return; }
            let bin = fromDecimal(dec, 2);
            decimalTerms.push(dec); binaryTerms.push(bin);
            
            let line = `${val}(${base}) ➔ ${getFullRepresentation(dec)}\n`;
            fullExpl += line; stepsOnly += line;
        }
        
        let resDec; let opExpl = '';
        if (operator === '+') { resDec = decimalTerms[0] + decimalTerms[1]; opExpl = lang.opExplAdd; }
        else if (operator === '-') { resDec = decimalTerms[0] - decimalTerms[1]; opExpl = lang.opExplSub; }
        else if (operator === '*') { resDec = decimalTerms[0] * decimalTerms[1]; opExpl = lang.opExplMul; }
        else if (operator === '/') {
            if (decimalTerms[1] === 0) { textOutput.innerHTML = `<span class="error-text">${lang.divByZeroErr}</span>`; return; }
            resDec = decimalTerms[0] / decimalTerms[1]; opExpl = lang.opExplDiv;
        }
        
        let resBin = fromDecimal(resDec, 2);
        let mathHeader = `\n${lang.tutorStep2} (${operator}):\n${opExpl}\n`;
        let vW = Math.max(binaryTerms[0].length, binaryTerms[1].length);
        let mathVisual = `  ${binaryTerms[0].padStart(vW)}\n${operator} ${binaryTerms[1].padStart(vW)}\n${'-'.repeat(vW + 4)}\n  ${resBin.padStart(vW)}(2)\n`;
        
        fullExpl += mathHeader + mathVisual; stepsOnly += mathHeader + mathVisual;
        
        let finalStepExpl = ""; let finalAns = "";
        const bnHex = currentLang === 'he' ? 'הקסדצימלי' : 'Hex';
        const bnOct = currentLang === 'he' ? 'אוקטלי' : 'Octal';
        
        // Final Output Resolution Base formatting based on user selection
        if (tutorTargetBase === 16) {
            if (tutorTargetMode === 'short') {
                let res = binaryShortcutMethod(resBin, 4, 16); finalStepExpl = res.steps; finalAns = res.finalResult;
            } else {
                finalStepExpl = `${lang.tutorStep3Std(bnHex)}:\n${resBin}(2) ➔ ${resDec}(10) ➔ ${fromDecimal(resDec, 16)}(16)`; finalAns = fromDecimal(resDec, 16);
            }
        } else if (tutorTargetBase === 8) {
            if (tutorTargetMode === 'short') {
                let res = binaryShortcutMethod(resBin, 3, 8); finalStepExpl = res.steps; finalAns = res.finalResult;
            } else {
                finalStepExpl = `${lang.tutorStep3Std(bnOct)}:\n${resBin}(2) ➔ ${resDec}(10) ➔ ${fromDecimal(resDec, 8)}(8)`; finalAns = fromDecimal(resDec, 8);
            }
        } else if (tutorTargetBase === 10) {
            finalStepExpl = `${lang.tutorStep3Dec}:\n${resBin}(2) ➔ ${resDec}(10)\n`; finalAns = resDec;
        } else {
            finalStepExpl = `${lang.tutorStep3Bin}:\n${resBin}(2)`; finalAns = resBin;
            if (tutorTargetMode === 'table') tableOutput.innerHTML = generateBinaryTableForTutor(resDec, resBin);
        }
        
        fullExpl += `\n${finalStepExpl}\n\n${lang.tutorFinalAnsLabel} ${getFullRepresentation(resDec)}`;
        stepsOnly += `\n${lang.tutorFinalAnsLabel} ${getFullRepresentation(resDec)}`;
        
        textOutput.innerText = fullExpl;
        lastTutorFullContent = fullExpl; lastTutorStepsContent = stepsOnly; lastTutorFinalResult = getFullRepresentation(resDec);
        
        // Visualize the math structure
        visOutput.innerHTML = generateVisualization(operator, binaryTerms[0], binaryTerms[1], resBin);
        
        // Append carry/borrow explanation dynamic to operator
        if(operator === '+') visNote.innerText = lang.carryExplainAdd;
        else if (operator === '-') visNote.innerText = lang.carryExplainSub;
        
        document.getElementById('visual-area').style.display = 'block';
        document.getElementById('tutor-copy-buttons').classList.remove('hidden');
    }

        document.getElementById('copy-tutor-visual').onclick = () => navigator.clipboard.writeText(lastTutorVisualContent).then(() => showMessageBox(langData[currentLang].copySuccess));
    });
</script>
