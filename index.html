<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Converter & Tutor</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: #fff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 950px;
            width: 100%;
            transition: all 0.3s ease;
            margin: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        header h1 {
            margin: 0;
            font-size: 2.2em;
            color: #1a1a1a;
        }

        /* Tabs Styling */
        .tab-nav {
            display: flex;
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 25px;
            gap: 20px;
        }

        .tab-btn {
            padding: 10px 5px;
            font-weight: 600;
            color: #6c757d;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #007bff;
            border-bottom-color: #007bff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .language-options {
            display: flex;
            gap: 5px;
        }

        .language-options button {
            background: none;
            border: 1px solid #ccc;
            color: #555;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s, color 0.3s;
        }

        .language-options button:hover,
        .language-options button.active {
            background-color: #007bff;
            color: #fff;
            border-color: #007bff;
        }

        main {
            display: flex;
            flex-direction: column;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #007bff;
            outline: none;
        }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

        .btn-primary:hover {
            background-color: #0056b3;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.85em;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }

        .results-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            min-height: 100px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: monospace;
            color: #343a40;
        }

        .action-buttons button {
            background: #e9ecef;
            border: none;
            color: #555;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 5px;
            transition: background-color 0.3s;
        }

        .action-buttons button:hover {
            background-color: #ced4da;
        }

        .text-size-options {
            text-align: right;
            margin-top: 15px;
        }

        .text-size-options button {
            background: none;
            border: 1px solid #ccc;
            color: #555;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 5px;
            transition: all 0.2s;
        }

        .text-size-options button.active {
            background-color: #007bff;
            color: #fff;
            border-color: #007bff;
        }

        .explanation-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .explanation-options {
            margin-top: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .explanation-options button {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background-color 0.3s;
        }

        .explanation-options button:hover {
            background-color: #0056b3;
        }

        #explanation-content p {
            margin: 0 0 8px 0;
            padding-left: 10px;
            border-left: 3px solid #007bff;
        }

        #explanation-content p b {
            color: #0056b3;
        }

        .explanation-section h4 {
            margin-top: 15px;
            margin-bottom: 10px;
            color: #007bff;
            font-size: 1.2em;
        }

        .collapsible-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid #ccc;
            transition: all 0.3s;
        }

        .collapsible-toggle:hover {
            color: #007bff;
            border-color: #007bff;
        }

        .collapsible-toggle.open i {
            transform: rotate(180deg);
        }

        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out;
        }

        .collapsible-content.open {
            max-height: 1000px;
        }

        .message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #333;
            color: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .message-box.show {
            opacity: 1;
            visibility: visible;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .binary-conversion-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
            background: #fff;
        }

        .binary-conversion-table th,
        .binary-conversion-table td {
            border: 1px solid #eee;
            padding: 10px 6px;
            text-align: center;
            min-width: 60px;
        }

        .binary-conversion-table th {
            background-color: #f1f5f9;
            font-weight: bold;
            color: #475569;
        }

        .binary-conversion-table tr td:first-child {
            background-color: #f8fafc;
            font-weight: 600;
            text-align: left;
            padding-left: 12px;
            position: sticky;
            left: 0;
            z-index: 10;
        }

        .explanation-copy-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .explanation-copy-buttons button {
            background-color: #6c757d;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background-color 0.3s;
        }

        .input-number-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .input-and-clear {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .input-and-clear input[type="text"] {
            flex-grow: 1;
            width: auto;
        }

        .clear-top-btn {
            background: #e9ecef;
            border: none;
            color: #555;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            height: 48px;
            width: 48px;
        }

        .input-settings-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .input-settings-row .input-group {
            flex: 1;
            min-width: 150px;
        }

        body[dir="rtl"] .input-and-clear {
            flex-direction: row-reverse;
        }

        /* Tutor Specific Styling */
        .tutor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .target-base-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
            margin-top: 8px;
        }

        .target-base-btn {
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            text-align: center;
        }

        .target-base-btn.active {
            background: #007bff;
            color: #fff;
            border-color: #007bff;
        }

        .tutor-input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .theory-item {
            margin-bottom: 15px;
            border-left: 4px solid #007bff;
            padding-left: 10px;
        }

        body[dir="rtl"] .theory-item {
            border-left: none;
            border-right: 4px solid #007bff;
            padding-left: 0;
            padding-right: 10px;
        }

        @media (max-width: 768px) {
            .tutor-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .input-and-clear {
                flex-direction: column;
                align-items: stretch;
            }
            .input-and-clear input[type="text"],
            .clear-top-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1 id="app-title">Base Converter</h1>
                <div class="language-options">
                    <button id="lang-en" class="active">EN</button>
                    <button id="lang-he">HE</button>
                </div>
            </div>
        </header>

        <nav class="tab-nav">
            <div class="tab-btn active" data-tab="converter-tab" id="tab-label-converter">Converter</div>
            <div class="tab-btn" data-tab="tutor-tab" id="tab-label-tutor">Exercise Tutor</div>
        </nav>

        <main>
            <!-- TAB 1: ORIGINAL CONVERTER -->
            <div id="converter-tab" class="tab-content active">
                <div class="explanation-container">
                    <h2 id="usage-toggle" class="collapsible-toggle">
                        Usage \ הוראות שימוש
                        <i class="fas fa-chevron-down"></i>
                    </h2>
                    <div id="usage-content" class="collapsible-content">
                        <!-- Content updated by JavaScript updateUI() -->
                    </div>
                </div>

                <div class="input-section">
                    <div class="input-number-container">
                        <label for="input-number" id="label-number">Enter a number:</label>
                        <div class="input-and-clear">
                            <input type="text" id="input-number" placeholder="e.g., 101.10 or 5/2">
                            <button id="clear-btn" class="clear-top-btn" title="Clear All"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>

                    <div class="input-settings-row">
                        <div class="input-group">
                            <label for="from-base" id="label-from-base">Source Base:</label>
                            <select id="from-base">
                                <option value="2">Binary (2)</option>
                                <option value="8">Octal (8)</option>
                                <option value="10" selected>Decimal (10)</option>
                                <option value="16">Hexadecimal (16)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="decimal-places" id="label-precision">Decimal Places:</label>
                            <input type="number" id="decimal-places" value="8" min="0" max="20">
                        </div>
                    </div>

                    <button id="convert-btn" class="btn-primary">Convert</button>
                </div>

                <div class="output-section">
                    <div class="output-header">
                        <h2 id="output-title">Results:</h2>
                        <div class="action-buttons">
                            <button id="copy-btn" title="Copy to Clipboard"><i class="fas fa-copy"></i></button>
                        </div>
                    </div>
                    <div class="results-box" id="results"></div>
                    <div class="text-size-options">
                        <button id="small-text">A</button>
                        <button id="medium-text" class="active">A</button>
                        <button id="large-text">A</button>
                    </div>
                </div>
                
                <div class="explanation-section" id="original-explanation" style="display: none;">
                    <h3 id="explanation-title">Detailed Explanation</h3>
                    <div class="explanation-options">
                        <button class="exp-btn" data-base="2">Binary</button>
                        <button class="exp-btn" data-base="8">Octal</button>
                        <button class="exp-btn" data-base="10">Decimal</button>
                        <button class="exp-btn" data-base="16">Hex</button>
                    </div>
                    <div id="explanation-content" class="results-box"></div>
                    <div class="explanation-copy-buttons">
                        <button id="copy-explanation-btn"><i class="fas fa-copy"></i> <span id="copy-full-exp-text">Copy Full Explanation</span></button>
                        <button id="copy-csv-table-btn" style="display:none;"><i class="fas fa-table"></i> <span id="copy-csv-table-text">Copy Table CSV</span></button>
                    </div>
                </div>
            </div>

            <!-- TAB 2: EXERCISE TUTOR -->
            <div id="tutor-tab" class="tab-content">
                <div class="tutor-grid">
                    <div class="tutor-input-area">
                        <div class="tutor-input-header">
                            <label id="label-exercise">Write Exercise:</label>
                            <div class="flex gap-2">
                                <button id="try-example-btn" class="text-xs text-blue-600 underline">Try Example</button>
                                <button id="clear-tutor-btn" title="Clear Input" class="text-gray-500 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                        <textarea id="exercise-input" placeholder="128(10) + f(h) or Ab(h) + 1101(2)" style="height: 120px;"></textarea>
                        
                        <div class="mt-4 mb-4">
                            <label id="label-target-base">Desired Solution Form:</label>
                            <div class="target-base-options">
                                <button class="target-base-btn" data-base="2" data-mode="normal" id="tutor-opt-bin">Binary</button>
                                <button class="target-base-btn" data-base="2" data-mode="table" id="tutor-opt-bin-table">Binary Table</button>
                                <button class="target-base-btn" data-base="8" data-mode="normal" id="tutor-opt-oct">Octal</button>
                                <button class="target-base-btn" data-base="8" data-mode="short" id="tutor-opt-oct-short">Octal (Short)</button>
                                <button class="target-base-btn" data-base="10" data-mode="normal" id="tutor-opt-dec">Decimal</button>
                                <button class="target-base-btn" data-base="16" data-mode="normal" id="tutor-opt-hex">Hex</button>
                                <button class="target-base-btn active" data-base="16" data-mode="short" id="tutor-opt-hex-short">Hex (Short)</button>
                            </div>
                        </div>

                        <button id="solve-exercise-btn" class="btn-primary">Solve Exercise</button>

                        <div class="explanation-section mt-4" style="background: white;">
                            <h2 id="theory-toggle" class="collapsible-toggle">
                                Base Arithmetic Methodology \ שיטות חישוב
                                <i class="fas fa-chevron-down"></i>
                            </h2>
                            <div id="theory-content" class="collapsible-content text-sm">
                                <!-- Content updated by JavaScript updateUI() -->
                            </div>
                        </div>
                    </div>
                    <div class="tutor-output-area">
                        <label id="label-solution">Solution and Explanation:</label>
                        <div id="tutor-results" class="results-box" style="font-size: 0.9em; min-height: 200px; padding: 0;">
                            <div id="tutor-text-output" style="padding: 15px; white-space: pre-wrap;">Waiting for input...</div>
                            <div id="tutor-table-output"></div>
                        </div>
                        <div class="explanation-copy-buttons" id="tutor-copy-buttons" style="display: none;">
                            <button id="copy-tutor-full"><i class="fas fa-copy"></i> <span id="copy-tutor-full-text">Copy Full Explanation</span></button>
                            <button id="copy-tutor-steps"><i class="fas fa-file-alt"></i> <span id="copy-tutor-steps-text">Copy Steps Only</span></button>
                            <button id="copy-tutor-result-only"><i class="fas fa-check"></i> <span id="copy-result-only-text">Result Only</span></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="message-box" class="message-box"></div>

    <script>
        const digitsMap = "0123456789ABCDEF";
        const baseAlias = {
            'h': 16, 'hex': 16, 'd': 10, 'dec': 10,
            'b': 2, 'bin': 2, 'o': 8, 'oct': 8
        };

        const langData = {
            en: {
                title: 'Base Converter', labelNumber: 'Enter a number:', labelFromBase: 'Source Base:', labelPrecision: 'Decimal Places:', convertBtn: 'Convert', outputTitle: 'Results:', explanationTitle: 'Detailed Explanation', copySuccess: 'Copied to clipboard!', copyFail: 'Could not copy.', invalidNumber: 'Invalid input.', binary: 'Binary', octal: 'Octal', decimal: 'Decimal', hex: 'Hexadecimal', expToDecTitle: (num, base) => `✨ Converting '${num}' from base ${base} to decimal (base 10) ✨`, expToDecBody: (digit, pos, value, base, term) => `  Digit '${digit}' at position ${pos}: ${value} * (${base}^${pos}) = ${term}`, expFinalSum: (sum) => `  Final Sum: ${sum}`, expFromDecTitle: (num, base) => `✨ Converting '${num}' from decimal (base 10) to base ${base} ✨`, expFromDecBody: (current, base, next, rem, remDigit) => `  ${current} / ${base} = ${next} remainder ${rem} (${remDigit})`, expFracFromDecTitle: (num, base) => `✨ Converting fractional part to base ${base} ✨`, expFracFromDecBody: (current, base, product, digit) => `  ${current} * ${base} = ${product} (Digit: ${digit})`, expReadRemainders: (result) => `  Final Result: ${result}`, binaryTableTitle: (decimal) => `Binary Conversion Table for ${decimal}`, copyFullExp: 'Copy Full Explanation', copyCsvTable: 'Copy Table CSV', rowPower: 'Power', rowValue: 'Value', rowBit: 'Bit',
                tabConverter: 'Converter', tabTutor: 'Exercise Tutor', labelExercise: 'Write Exercise:', labelSolution: 'Solution and Explanation:', solveBtn: 'Solve Exercise', copyFull: 'Copy Full Explanation', copySteps: 'Copy Steps Only', copyResultOnly: 'Result Only',
                labelTargetBase: 'Desired Solution Form:', tutorOptHex: 'Hex', tutorOptHexShort: 'Hex (Short)', tutorOptDec: 'Decimal', tutorOptOct: 'Octal', tutorOptOctShort: 'Octal (Short)', tutorOptBin: 'Binary', tutorOptBinTable: 'Binary Table',
                tutorStep1: 'Step 1: Convert all numbers to Binary', tutorStep2: 'Step 2: Binary Arithmetic', tutorStep3Hex: 'Step 3: Convert to Hex via Shortcut Method', tutorStep3Oct: 'Step 3: Convert to Octal via Shortcut Method', tutorStep3Dec: 'Step 3: Convert Binary Result to Decimal', tutorStep3Bin: 'Step 3: Final Binary Result', tutorStep3Std: (baseName) => `Step 3: Convert Result to ${baseName} (via Decimal)`,
                usageTitle: 'Usage',
                usageText: `<b>Converter Tab:</b> Convert single numbers, decimals, or fractions between bases. Adjust precision for decimals. View step-by-step conversion logic and binary tables.<br><br><b>Exercise Tutor:</b> Solve expressions like 128(10) + F(H) or 1011 * 10. The system converts everything to Binary, performs the operation, and shows the result in your chosen format (Shortcut grouping for Hex/Octal supported).`,
                theoryTitle: 'Arithmetic Methodology',
                theoryContent: `
                    <div class="theory-item"><b>Addition (+):</b> Align digits. $0+0=0$, $0+1=1$, $1+1=10$ (write $0$, carry $1$), $1+1+1=11$ (write $1$, carry $1$).</div>
                    <div class="theory-item"><b>Subtraction (-):</b> Align digits. If $0-1$, borrow from the next column (borrowed $1$ becomes $2$ in the current column).</div>
                    <div class="theory-item"><b>Multiplication (*):</b> Multiply each digit of the multiplier by the multiplicand (like decimal), then sum partial results with shifts.</div>
                    <div class="theory-item"><b>Division (/):</b> Performed via long division. Find how many times the divisor fits into the dividend prefix.</div>
                `,
                opExplAdd: "Explanation: Align the binary points. Start from the rightmost bit. If a sum exceeds 1, carry the 1 to the next left column.",
                opExplSub: "Explanation: Align the binary points. If you subtract 1 from 0, borrow 1 from the next left digit.",
                opExplMul: "Explanation: Multiply like decimal multiplication. For every '1' in the bottom number, copy the top number shifted to that position, then sum.",
                opExplDiv: "Explanation: Perform long division. Subtract the divisor from dividend segments repeatedly until the end.",
                shortcutStepGroup: (size) => `1. Group bits into sets of ${size} from the decimal point.`,
                shortcutGroupsLabel: "Groups:",
                shortcutResultLabel: "Result:",
                tutorFinalAnsLabel: "Final Answer:",
                divByZeroErr: "Error: Division by zero"

        function getPrecision() {
            const val = parseInt(document.getElementById('decimal-places').value);
            return isNaN(val) ? 8 : val;
        }

        function cleanFloat(num, prec) {
            const p = typeof prec === 'undefined' ? getPrecision() : prec;
            return parseFloat(num.toFixed(p));
        }

        function toDecimal(number, base) {
            if (typeof number !== 'string') number = String(number);
            if (number.includes('/')) {
                const parts = number.split('/');
                if (parts.length !== 2) return null;
                const num = toDecimal(parts[0], base);
                const den = toDecimal(parts[1], base);
                return (num !== null && den !== null && den !== 0) ? cleanFloat(num / den) : null;
            }
            const parts = number.toUpperCase().split('.');
            let decimalValue = 0;
            const intDigits = parts[0].split('').reverse();
            for (let i = 0; i < intDigits.length; i++) {
                let val = digitsMap.indexOf(intDigits[i]);
                if (val === -1 || val >= base) return null;
                decimalValue += val * Math.pow(base, i);
            }
            if (parts.length === 2) {
                const fracDigits = parts[1].split('');
                for (let i = 0; i < fracDigits.length; i++) {
                    let val = digitsMap.indexOf(fracDigits[i]);
                    if (val === -1 || val >= base) return null;
                    decimalValue += val * Math.pow(base, -(i + 1));
                }
            } else if (parts.length > 2) return null;
            return cleanFloat(decimalValue);
        }

        function fromDecimal(number, base) {
            if (number === 0) return "0";
            let isNegative = number < 0;
            number = Math.abs(number);
            let intPart = Math.floor(number);
            let fracPart = number - intPart;
            let result = "";
            if (intPart === 0) result = "0";
            else {
                let tempInt = intPart;
                while (tempInt > 0) {
                    result = digitsMap[tempInt % base] + result;
                    tempInt = Math.floor(tempInt / base);
                }
            }
            if (fracPart > 0) {
                let fracResult = "";
                let count = 0;
                let tempFrac = fracPart;
                const prec = getPrecision();
                while (tempFrac > 0 && count < prec) {
                    tempFrac = cleanFloat(tempFrac * base, prec + 2);
                    let digit = Math.floor(tempFrac);
                    fracResult += digitsMap[digit];
                    tempFrac = cleanFloat(tempFrac - digit, prec + 2);
                    count++;
                }
                if (fracResult.length > 0) result += "." + fracResult;
            }
            return (isNegative ? "-" : "") + result;
        }

        function validateInput(number, base) {
            if (!number) return false;
            let validChars = digitsMap.substring(0, base);
            let pattern = new RegExp(`^[${validChars}\\.\\/]+$`, 'i');
            if (!pattern.test(number)) return false;
            if (number.includes('.') && number.includes('/')) return false;
            if ((number.match(/\./g) || []).length > 1) return false;
            if ((number.match(/\//g) || []).length > 1) return false;
            return true;
        }

        function removeEmojis(str) {
            return str.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '');
        }

        function binaryShortcutMethod(binString, groupSize, base) {
            const lang = langData[currentLang];
            let isNegative = binString.startsWith('-');
            let cleanBin = binString.replace('-', '');
            let parts = cleanBin.split('.');
            let intPart = parts[0];
            let fracPart = parts[1] || "";

            const stepLabel = base === 16 ? lang.tutorStep3Hex : lang.tutorStep3Oct;
            let steps = `${stepLabel}:\n`;
            steps += `${lang.shortcutStepGroup(groupSize)}\n`;

            while (intPart.length % groupSize !== 0) intPart = '0' + intPart;
            let intGroups = [];
            let intResult = "";
            for (let i = 0; i < intPart.length; i += groupSize) {
                let chunk = intPart.substring(i, i + groupSize);
                let digit = parseInt(chunk, 2).toString(base).toUpperCase();
                intGroups.push(chunk);
                intResult += digit;
            }

            let fracResult = "";
            let fracGroups = [];
            if (fracPart) {
                while (fracPart.length % groupSize !== 0) fracPart += '0';
                for (let i = 0; i < fracPart.length; i += groupSize) {
                    let chunk = fracPart.substring(i, i + groupSize);
                    let digit = parseInt(chunk, 2).toString(base).toUpperCase();
                    fracGroups.push(chunk);
                    fracResult += digit;
                }
            }

            let finalResultStr = (isNegative ? "-" : "") + intResult.replace(/^0+(?!$)/, '') + (fracResult ? "." + fracResult : "");
            steps += `${lang.shortcutGroupsLabel} ${intGroups.join(' ')} ${fracPart ? '. ' + fracGroups.join(' ') : ''}\n`;
            steps += `${lang.shortcutResultLabel} ${finalResultStr}(${base})`;
            
            return { steps, finalResult: finalResultStr };
        }

        function generateBinaryTableForTutor(decimalValue, resBin) {
            const data = langData[currentLang];
            const prec = getPrecision();
            let intPart = Math.floor(Math.abs(decimalValue));
            
            let tableHTML = `<div style="padding: 15px; border-top: 1px solid #eee;"><h4>${data.binaryTableTitle(decimalValue)}</h4>`;
            tableHTML += '<div class="table-wrapper"><table class="binary-conversion-table"><thead><tr>';
            
            let powers = []; let values = []; let bits = [];
            let highestPower = intPart > 0 ? Math.floor(Math.log2(intPart)) : 0;
            for (let p = highestPower; p >= 0; p--) { powers.push(p); values.push(Math.pow(2, p)); }
            
            const binaryParts = resBin.replace('-', '').split('.');
            if (binaryParts[1]) { for (let i = 0; i < binaryParts[1].length; i++) { powers.push(-(i + 1)); values.push(Math.pow(2, -(i + 1))); } }
            
            tableHTML += `<th>${data.rowPower}</th>`;
            powers.forEach(p => tableHTML += `<th>2<sup>${p}</sup></th>`);
            tableHTML += '</tr></thead><tbody><tr>';
            tableHTML += `<td>${data.rowValue}</td>`;
            values.forEach(v => tableHTML += `<td>${cleanFloat(v, prec)}</td>`);
            tableHTML += '</tr><tr>';
            tableHTML += `<td>${data.rowBit}</td>`;
            
            let tempValTable = Math.abs(decimalValue);
            powers.forEach(p => {
                let val = Math.pow(2, p);
                let bit = tempValTable >= val - 0.0000000001 ? 1 : 0;
                bits.push(bit);
                if (bit) tempValTable = cleanFloat(tempValTable - val, prec + 5);
                tableHTML += `<td>${bit}</td>`;
            });
            tableHTML += '</tr></tbody></table></div></div>';
            return tableHTML;
        }

        function solveExercise() {
            const input = document.getElementById('exercise-input').value.toLowerCase();
            const textOutput = document.getElementById('tutor-text-output');
            const tableOutput = document.getElementById('tutor-table-output');
            const lang = langData[currentLang];
            
            tableOutput.innerHTML = "";
            
            const regex = /([0-9a-f.]+)\s*\(\s*([a-z0-9]+)\s*\)/g;
            let match;
            let terms = [], bases = [];
            while ((match = regex.exec(input)) !== null) {
                let val = match[1];
                let bStr = match[2];
                let base = baseAlias[bStr] || parseInt(bStr);
                terms.push(val); 
                bases.push(base);
            }

            let operator = '';
            let opExpl = '';
            if (input.includes('+')) { operator = '+'; opExpl = lang.opExplAdd; }
            else if (input.includes('-')) { operator = '-'; opExpl = lang.opExplSub; }
            else if (input.includes('*')) { operator = '*'; opExpl = lang.opExplMul; }
            else if (input.includes('/')) { operator = '/'; opExpl = lang.opExplDiv; }

            if (terms.length < 2 || !operator) {
                const parts = input.split(operator);
                if (parts.length >= 2 && /^[01.]+$/.test(parts[0].trim()) && /^[01.]+$/.test(parts[1].trim())) {
                    terms = [parts[0].trim(), parts[1].trim()];
                    bases = [2, 2];
                } else {
                    textOutput.innerText = currentLang === 'he' ? "פורמט לא תקין. השתמש ב: 128(10) + f(h)" : "Invalid format. Use: 128(10) + f(h)";
                    document.getElementById('tutor-copy-buttons').style.display = 'none';
                    return;
                }
            }

            let fullExpl = `${lang.tutorStep1}:\n`;
            let stepsOnly = "";
            let decimalTerms = [];
            let binaryTerms = [];

            for (let i = 0; i < terms.length; i++) {
                let dec = toDecimal(terms[i], bases[i]);
                if (dec === null) {
                    textOutput.innerText = `${lang.invalidNumber}: ${terms[i]}`;
                    return;
                }
                let bin = fromDecimal(dec, 2);
                decimalTerms.push(dec);
                binaryTerms.push(bin);
                let line = `${terms[i]}(${bases[i]}) ➔ ${bin}(2)\n`;
                fullExpl += line;
                stepsOnly += line;
            }

            let resDec;
            if (operator === '+') resDec = decimalTerms[0] + decimalTerms[1];
            else if (operator === '-') resDec = decimalTerms[0] - decimalTerms[1];
            else if (operator === '*') resDec = decimalTerms[0] * decimalTerms[1];
            else if (operator === '/') {
                if (decimalTerms[1] === 0) {
                    textOutput.innerText = lang.divByZeroErr;
                    return;
                }
                resDec = decimalTerms[0] / decimalTerms[1];
            }

            let resBin = fromDecimal(resDec, 2);
            let mathHeader = `\n${lang.tutorStep2} (${operator}):\n${opExpl}\n`;
            let visualWidth = Math.max(binaryTerms[0].length, binaryTerms[1].length);
            let mathVisual = `  ${binaryTerms[0].padStart(visualWidth)}\n${operator} ${binaryTerms[1].padStart(visualWidth)}\n${'-'.repeat(visualWidth + 4)}\n  ${resBin.padStart(visualWidth)}(2)\n`;
            
            fullExpl += mathHeader + mathVisual;
            stepsOnly += mathHeader + mathVisual;

            let finalStepExpl = "";
            let finalAns = "";

            // Localized base names for Step 3 Standard
            const bnHex = currentLang === 'he' ? 'הקסדצימלי' : 'Hex';
            const bnOct = currentLang === 'he' ? 'אוקטלי' : 'Octal';

            if (tutorTargetBase === 16) {
                if (tutorTargetMode === 'short') {
                    let res = binaryShortcutMethod(resBin, 4, 16);
                    finalStepExpl = res.steps;
                    finalAns = res.finalResult;
                } else {
                    finalStepExpl = `${lang.tutorStep3Std(bnHex)}:\n`;
                    finalStepExpl += `${resBin}(2) ➔ ${resDec}(10) ➔ ${fromDecimal(resDec, 16)}(16)`;
                    finalAns = fromDecimal(resDec, 16);
                }
            } else if (tutorTargetBase === 8) {
                if (tutorTargetMode === 'short') {
                    let res = binaryShortcutMethod(resBin, 3, 8);
                    finalStepExpl = res.steps;
                    finalAns = res.finalResult;
                } else {
                    finalStepExpl = `${lang.tutorStep3Std(bnOct)}:\n`;
                    finalStepExpl += `${resBin}(2) ➔ ${resDec}(10) ➔ ${fromDecimal(resDec, 8)}(8)`;
                    finalAns = fromDecimal(resDec, 8);
                }
            } else if (tutorTargetBase === 10) {
                finalStepExpl = `${lang.tutorStep3Dec}:\n`;
                finalStepExpl += `${resBin}(2) ➔ ${resDec}(10)\n`;
                finalAns = resDec;
            } else {

                   tableOutput.innerHTML = generateBinaryTableForTutor(resDec, resBin);

            fullExpl += `\n${finalStepExpl}`;

            textOutput.innerText = fullExpl;

        function generateExplanation(inputNum, srcBase, targetBase) {

                        let val = digitsMap.indexOf(intDigits[i]);
                        let term = cleanFloat(val * Math.pow(srcBase, i), prec);
                        let line = data.expToDecBody(intDigits[i], i, val, srcBase, term);
                        explanationHTML += `<p>${line}</p>`;
                        plainTextContent += line + '\n';
                    }
                    if (parts[1]) {
                        const fracDigits = parts[1].split('');
                        for (let i = 0; i < fracDigits.length; i++) {
                            let val = digitsMap.indexOf(fracDigits[i]);
                            let term = cleanFloat(val * Math.pow(srcBase, -(i + 1)), prec);
                            let line = `Digit '${fracDigits[i]}' at pos -${i+1}: ${val} * (${srcBase}^-${i+1}) = ${term}`;

                            plainTextContent += line + '\n';

                    }

                plainTextContent += removeEmojis(title) + '\n';
                let intPart = Math.floor(decimalValue);
                let fracPart = cleanFloat(decimalValue - intPart, prec);
                let tempInt = intPart;

                intSteps.forEach(s => {

                    explanationHTML += `<p>${line}</p>`;
                    plainTextContent += line + '\n';
                });
                if (fracPart > 0) {
                    explanationHTML += `<h4>${data.expFracFromDecTitle(decimalValue, targetBase)}</h4>`;

                    let count = 0;
                    while (tempFrac > 0 && count < prec) {
                        let product = cleanFloat(tempFrac * targetBase, prec + 2);
                        let digit = Math.floor(product);
                        let line = data.expFracFromDecBody(tempFrac, targetBase, product, digitsMap[digit]);
                        explanationHTML += `<p>${line}</p>`;
                        plainTextContent += line + '\n';
                        tempFrac = cleanFloat(product - digit, prec + 2);

                }
                const finalResult = fromDecimal(decimalValue, targetBase);

                    for (let p = highestPower; p >= 0; p--) { powers.push(p); values.push(Math.pow(2, p)); }
                    const binaryParts = finalResult.split('.');
                    if (binaryParts[1]) { for (let i = 0; i < binaryParts[1].length; i++) { powers.push(-(i + 1)); values.push(Math.pow(2, -(i + 1))); } }
                    tableHTML += `<th>${data.rowPower}</th>`;
                    powers.forEach(p => tableHTML += `<th>2<sup>${p}</sup></th>`);
                    tableHTML += '</tr></thead><tbody><tr>';
                    tableHTML += `<td>${data.rowValue}</td>`;
                    values.forEach(v => tableHTML += `<td>${cleanFloat(v, prec)}</td>`);
                    tableHTML += '</tr><tr>';
                    tableHTML += `<td>${data.rowBit}</td>`;
                    let tempValTable = decimalValue;
                    powers.forEach(p => {
                        let val = Math.pow(2, p);
                        let bit = tempValTable >= val - 0.0000000001 ? 1 : 0;
                        bits.push(bit);
                        if (bit) tempValTable = cleanFloat(tempValTable - val, prec + 5);
                        tableHTML += `<td>${bit}</td>`;
                    });
                    tableHTML += '</tr></tbody></table></div>';
                    explanationHTML += tableHTML;
                    currentCsvTableData = [ [data.rowPower, ...powers.map(p => `2^${p}`)].join(','), [data.rowValue, ...values.map(v => cleanFloat(v, prec))].join(','), [data.rowBit, ...bits].join(',') ].join('\n');
                    document.getElementById('copy-csv-table-btn').style.display = 'inline-block';
                }
            }
            explanationContent.innerHTML = explanationHTML;
            currentPlainTextExplanation = plainTextContent.trim();
        }

        function handleConversion() {
            const input = document.getElementById('input-number').value.trim();
            const from = parseInt(document.getElementById('from-base').value);
            const resBox = document.getElementById('results');
            if (!validateInput(input, from)) { resBox.textContent = langData[currentLang].invalidNumber; return; }
            const dec = toDecimal(input, from);
            if (dec === null) { resBox.textContent = langData[currentLang].invalidNumber; return; }
            resBox.textContent = `Decimal: ${dec}\nBinary:  ${fromDecimal(dec, 2)}\nOctal:   ${fromDecimal(dec, 8)}\nHex:     ${fromDecimal(dec, 16)}`;
            document.getElementById('original-explanation').style.display = 'block';
        }

        function updateUI() {
            const data = langData[currentLang];
            document.title = data.title;
            document.querySelector('h1').textContent = data.title;
            document.getElementById('tab-label-converter').textContent = data.tabConverter;
            document.getElementById('tab-label-tutor').textContent = data.tabTutor;
            document.getElementById('label-number').textContent = data.labelNumber;
            document.getElementById('label-from-base').textContent = data.labelFromBase;
            document.getElementById('label-precision').textContent = data.labelPrecision;
            document.getElementById('convert-btn').textContent = data.convertBtn;
            document.getElementById('output-title').textContent = data.outputTitle;
            document.getElementById('explanation-title').textContent = data.explanationTitle;
            document.getElementById('label-exercise').textContent = data.labelExercise;
            document.getElementById('label-solution').textContent = data.labelSolution;
            document.getElementById('solve-exercise-btn').textContent = data.solveBtn;
            document.getElementById('copy-tutor-full-text').textContent = data.copyFull;
            document.getElementById('copy-tutor-steps-text').textContent = data.copySteps;
            document.getElementById('copy-result-only-text').textContent = data.copyResultOnly;
            document.getElementById('label-target-base').textContent = data.labelTargetBase;
            document.getElementById('usage-toggle').innerHTML = `${data.usageTitle} <i class="fas fa-chevron-down"></i>`;
            document.getElementById('usage-content').innerHTML = data.usageText;
            document.getElementById('theory-toggle').innerHTML = `${data.theoryTitle} <i class="fas fa-chevron-down"></i>`;
            document.getElementById('theory-content').innerHTML = data.theoryContent;
            
            document.getElementById('tutor-opt-hex').textContent = data.tutorOptHex;
            document.getElementById('tutor-opt-hex-short').textContent = data.tutorOptHexShort;
            document.getElementById('tutor-opt-dec').textContent = data.tutorOptDec;
            document.getElementById('tutor-opt-oct').textContent = data.tutorOptOct;
            document.getElementById('tutor-opt-oct-short').textContent = data.tutorOptOctShort;
            document.getElementById('tutor-opt-bin').textContent = data.tutorOptBin;
            document.getElementById('tutor-opt-bin-table').textContent = data.tutorOptBinTable;

            document.querySelectorAll('.exp-btn').forEach(b => {
                const base = b.dataset.base;
                if (base === "2") b.textContent = data.binary; 
                else if (base === "8") b.textContent = data.octal; 
                else if (base === "10") b.textContent = data.decimal; 
                else if (base === "16") b.textContent = data.hex;
            });
            document.getElementById('copy-full-exp-text').textContent = data.copyFullExp;
            document.getElementById('copy-csv-table-text').textContent = data.copyCsvTable;
            
            const isHe = currentLang === 'he';
            document.body.dir = isHe ? 'rtl' : 'ltr';
            if (lastToExplainBase) generateExplanation(lastInputNumberForExplanation, lastFromBaseForExplanation, lastToExplainBase);
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.tab).classList.add('active');
                };
            });

            document.querySelectorAll('.target-base-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.target-base-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    tutorTargetBase = parseInt(btn.dataset.base);
                    tutorTargetMode = btn.dataset.mode;
                };
            });

            document.getElementById('try-example-btn').onclick = () => {
                document.getElementById('exercise-input').value = "128(10) + f(h)";
            };

            document.getElementById('clear-tutor-btn').onclick = () => {
                document.getElementById('exercise-input').value = "";
                document.getElementById('tutor-text-output').innerText = "Waiting for input...";
                document.getElementById('tutor-table-output').innerHTML = "";
                document.getElementById('tutor-copy-buttons').style.display = 'none';
            };

            document.getElementById('convert-btn').onclick = handleConversion;
            document.getElementById('clear-btn').onclick = () => {
                document.getElementById('input-number').value = ''; 
                document.getElementById('results').textContent = ''; 
                document.getElementById('explanation-content').innerHTML = ''; 
                document.getElementById('original-explanation').style.display = 'none'; 
                lastToExplainBase = null;
            };
            
            document.getElementById('solve-exercise-btn').onclick = solveExercise;

            document.getElementById('lang-en').onclick = () => { currentLang = 'en'; document.getElementById('lang-en').classList.add('active'); document.getElementById('lang-he').classList.remove('active'); updateUI(); };
            document.getElementById('lang-he').onclick = () => { currentLang = 'he'; document.getElementById('lang-he').classList.add('active'); document.getElementById('lang-en').classList.remove('active'); updateUI(); };
            
            document.querySelectorAll('.exp-btn').forEach(b => b.onclick = (e) => {
                const target = parseInt(e.target.dataset.base);
                const input = document.getElementById('input-number').value.trim();
                const from = parseInt(document.getElementById('from-base').value);
                lastInputNumberForExplanation = input; lastFromBaseForExplanation = from; lastToExplainBase = target;
                generateExplanation(input, from, target);
            });

            document.getElementById('usage-toggle').onclick = () => { 
                document.getElementById('usage-content').classList.toggle('open'); 
                document.getElementById('usage-toggle').classList.toggle('open'); 
            };

            document.getElementById('theory-toggle').onclick = () => { 
                document.getElementById('theory-content').classList.toggle('open'); 
                document.getElementById('theory-toggle').classList.toggle('open'); 
            };

            document.getElementById('copy-btn').onclick = () => { navigator.clipboard.writeText(document.getElementById('results').textContent).then(() => showMessageBox(langData[currentLang].copySuccess)); };
            document.getElementById('copy-explanation-btn').onclick = () => { navigator.clipboard.writeText(currentPlainTextExplanation).then(() => showMessageBox(langData[currentLang].copySuccess)); };
            document.getElementById('copy-csv-table-btn').onclick = () => { navigator.clipboard.writeText(currentCsvTableData).then(() => showMessageBox(langData[currentLang].copySuccess)); };
            
            document.getElementById('copy-tutor-full').onclick = () => { navigator.clipboard.writeText(lastTutorFullContent).then(() => showMessageBox(langData[currentLang].copySuccess)); };
            document.getElementById('copy-tutor-steps').onclick = () => { navigator.clipboard.writeText(lastTutorStepsContent).then(() => showMessageBox(langData[currentLang].copySuccess)); };
            document.getElementById('copy-tutor-result-only').onclick = () => { navigator.clipboard.writeText(lastTutorFinalResult).then(() => showMessageBox(langData[currentLang].copySuccess)); };

            const resize = (size, id) => {
                document.getElementById('results').style.fontSize = size; 
                document.getElementById('explanation-content').style.fontSize = size; 
                document.getElementById('tutor-text-output').style.fontSize = size;
                document.querySelectorAll('.text-size-options button').forEach(b => b.classList.remove('active')); 
                document.getElementById(id).classList.add('active');
            };
            document.getElementById('small-text').onclick = () => resize('0.85em', 'small-text'); 
            document.getElementById('medium-text').onclick = () => resize('1em', 'medium-text'); 
            document.getElementById('large-text').onclick = () => resize('1.15em', 'large-text');
        });
    </script>
</body>
</html>
